name: SSO

on:
  push:
    branches:
      - "main"
    paths:
      - "sso/**"
  workflow_dispatch:

jobs:
  dropbox:
    name: Deploy SSO Image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v3.4.0
      - name: Publish SSO Docker Image
        uses: openzim/docker-publish-action@v10
        with:
          image-name: kiwix/sso
          on-master: latest
          restrict-to: kiwix/container-images
          context: sso
          registries: ghcr.io
          credentials: GHCRIO_USERNAME=${{ secrets.GHCR_USERNAME }}
            GHCRIO_TOKEN=${{ secrets.GHCR_TOKEN }}
