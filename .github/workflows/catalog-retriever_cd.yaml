name: Catalog Retriever

on:
  push:
    branches:
      - 'main'
    paths:
      - 'catalog-retriever/**'
  workflow_dispatch:

jobs:

  dropbox:
    name: Deploy Catalog Retriever Image
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v6
      - name: Publish Catalog Retriever Docker Image
        uses: openzim/docker-publish-action@v10
        with:
          image-name: kiwix/catalog-retriever
          on-master: latest
          restrict-to: kiwix/container-images
          context: catalog-retriever
          registries: ghcr.io
          credentials:
            GHCRIO_USERNAME=${{ secrets.GHCR_USERNAME }}
            GHCRIO_TOKEN=${{ secrets.GHCR_TOKEN }}
          platforms: |
            linux/amd64
            linux/arm64
